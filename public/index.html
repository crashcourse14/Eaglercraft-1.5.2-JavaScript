<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft - Java to JavaScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        
        #container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #canvas {
            flex: 1;
            display: block;
            background-color: #000;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        
        #loading h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        #loading p {
            font-size: 14px;
            color: #aaa;
            margin: 10px 0;
        }
        
        #loading .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        #loading.error {
            background: rgba(200, 0, 0, 0.9);
        }
        
        #loading.error h1 {
            color: #ff6b6b;
        }
        
        #loading.error p {
            color: #ffb3b3;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-width: 500px;
            overflow-y: auto;
            max-height: 200px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="loading">
        <h1>Eaglercraft</h1>
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <!-- Load the transpiled JavaScript -->
    <script src="classes.js"></script>
    
    <!-- Load initialization helper -->
    <script src="init.js"></script>
    
    <!-- Simple startup script -->
    <script>
        console.log("HTML initialization script loaded");
        // The init.js script will auto-start unless EAGLER_AUTO_START is set to false
    </script>
</body>
</html>
